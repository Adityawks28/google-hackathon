services:
  firebase-emulator:
    build:
      context: .
      dockerfile: Dockerfile.firebase
    ports:
      - "4000:4000" # Emulator UI
      - "8080:8080" # Firestore
      - "9199:9199" # Storage
      - "5001:5001" # Functions
      - "9099:9099" # Auth
    volumes:
      - .:/app
      - firebase_data:/app/seed
    environment:
      - FIREBASE_PROJECT_ID=google-hackathon

volumes:
  firebase_data:
